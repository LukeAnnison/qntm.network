<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>qntm.network — markdown demo</title>
<!--
  Hand-authored shell (2026-07-23). This file used to be GENERATED by the Python render app,
  which retired: rendering moved into the browser so the document can be edited live. The page
  now ships an empty document container and lets app.js fill it.
-->
<!-- Same font load as index.html — Inter for prose, JetBrains Mono for code and chrome. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css">
<meta name="theme-color" content="#0a0b0a">
</head>
<body>
<div id="app" data-mode="view">
  <header class="toolbar">
    <span class="mark">qntm</span>
    <button id="mode-toggle" type="button" aria-pressed="false">Edit</button>
  </header>

  <main>
    <!-- VIEW mode: the rendered document. -->
    <article id="rendered"></article>

    <!-- EDIT mode: the markdown source. Exactly one of these two is visible at a time; the
         switch is #app[data-mode], set by main.ts. -->
    <textarea id="source" spellcheck="false" aria-label="Markdown source"></textarea>
  </main>

  <p class="ephemeral-note">
    Edits live in this tab only — nothing is saved, and refreshing restores the original
    document. That is deliberate for this version, not an oversight.
  </p>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
