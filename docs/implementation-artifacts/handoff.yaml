  qualitative:
  - thread: the-app-becomes-typescript-2026-07-23
    note: >
      The editability arc. Asked for "an edit mode and a viewer mode, all lost on refresh", which
      surfaced a language question, which surfaced the real one. The first pass of reasoning was
      WRONG and worth recording as such: it priced the constraints of the moment — a Worker that
      happened to be JS, a "no build step" clause written for a hand-authored landing page,
      three-day-old Python — and treated a demo's incidental decisions as architecture. The
      operator's correction was the turning point: "this is not even a shard of a real thing, we
      are allowed to choose what this long-term project should be, we build correctly, we are not
      constrained by demo decisions made yesterday." That is the reasoning to carry forward when
      the next fork appears — evaluate the destination, not the sunk cost.
      DELIVERED: a TypeScript app (strict tsconfig, esbuild, CI build gated on bundle staleness),
      the markdown renderer ported to the browser, the Python render app RETIRED with its flows
      and sink in the same change, and view/edit modes with in-memory-only editing. All verified
      in a real browser, not just by predicate — toggled both ways, typed markdown rendered live,
      refresh discarded edits, storage empty throughout.
  - thread: the-tooling-product-gap-opened-and-closed-the-same-day
    note: >
      RESOLVED — kept because the SHAPE of it is the point, not the outcome. This thread was
      written in the morning to record that flow-trace governed this project's TOOLING and not its
      PRODUCT: the app had gone TypeScript, flow-trace captured Python only, and the observed half
      was simply absent. It was filed on the TOOL as `typescript-capture-backend` rather than
      carried as a shrug here, because a gap in a shared substrate that widens with every app
      built is the tool's problem to solve, not each project's constraint to absorb. flow-trace
      built it that day — scaffold-RED, then three legs (the node observer, scenario dispatch by
      language, canonical routing on TS) — and it is `working` at depth 3. Adopted here the same
      afternoon. The lesson worth keeping: the gap closed because it was WRITTEN somewhere the
      derived queue could see it. Had it stayed a caveat in a code comment it would still be true.
  - thread: what-the-observed-half-here-does-and-does-not-prove
    note: >
      The app's flows are adjudicated by tests/flow_scenarios/render_and_edit.ts, which drives the
      REAL modules under the node observer with a STUBBED DOM — a few fake elements carrying only
      the members mount() actually touches. Read the claim precisely. It proves these modules call
      each other as flows.yaml declares, and the two forbidden_flows prove the renderer and the
      session never call back into the DOM-owning module. It does NOT prove the page renders
      correctly; that is the in-browser check every close runs. The three layers are complementary
      rather than redundant: existence checks catch a deleted file, flow checks catch a rewiring
      that leaves every file in place, the browser catches the thing that is wired right and looks
      wrong.
      ONE STRUCTURAL CONSEQUENCE NOT TO UNDO: app/main.ts must stay importable without side
      effects. It used to end in a bare `void main()`, which made it unobservable by anything that
      is not a browser (and made it throw under node on a relative fetch URL). The bootstrap now
      lives alone in boot.ts, which is the build entry and which nothing imports. Putting a
      top-level call back into main.ts would silently kill the observed half.
  - thread: absence-checks-convict-their-own-documentation
    note: >
      A lesson from scaffolding the enforcers RED, worth remembering before writing the next
      absence invariant. Two predicates FAILed against correct code because they grepped raw
      text: assert_edits_are_ephemeral matched session.ts's docstring ("no localStorage, no
      sessionStorage...") and assert_markdown_renders_client_side matched flows.yaml's comment
      explaining why qntm_network.render retired. Prose ABOUT an absence is indistinguishable
      from its presence to a substring search — so the check punishes exactly the documentation
      that makes the invariant legible. Fixed structurally rather than by weakening the checks:
      strip JS comments before scanning (_strip_js_comments), and parse the YAML to inspect
      declared ENTRIES rather than grepping the file.
  - thread: open-residue
    note: >
      Not blocking, surfaced not hidden. (1) THREE ORPHAN PINS — push-to-deploy-loop,
      responsive-across-devices, signature-interactions-embody-the-thesis are declared with no
      driving backlog row. All pre-existing, all plausibly legitimate always-on capabilities;
      the tool surfaces them as INFO. (2) ROOTING DEBT — 8 pre-existing capabilities carry a
      silent rooting absence. This arc reasoned the four it TOUCHED (the three new ones, plus
      push-to-deploy-loop which it amended) and deliberately did not expand into the rest.
      (3) DEPLOY TARGET DEFERRED — GitHub Pages main:/ is unchanged and the live site was never
      at risk. Moving to Cloudflare Pages (beside the Worker, with a native build step, which
      would remove the committed-bundle staleness gate entirely) is a real option; both consume
      the same output, so it can be decided whenever without reshaping the build.
      (4) BUNDLE SIZE — demo/app.js is 146kb, nearly all markdown-it. Fine now; if it matters
      later the fork is a smaller parser versus code-splitting, not a rewrite.
