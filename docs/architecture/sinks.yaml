# DECLARED SINKS (this is declaration, NOT code) — where work LANDS. depth-to-sink is measured
# TO these points, so this file decides what "depth" means for this project.
#
# LIVE AGAIN 2026-07-23 (second pass), for the same reason as flows.yaml: the sink is checkable
# now that flow-trace observes TypeScript. It previously declared `rendered-page-written`
# (qntm_network.render.build:write_page), the Python build's file write, which retired with that
# app; the file then sat empty while TS was unobservable.
#
# THE EDITORIAL CALL, restated because changing this line changes what every depth number means:
# a browser app's terminal effect is the DOM mount, not a disk write. So depth reads as "how many
# hops from entry to the document being on screen" — the browser equivalent of what
# "hops to the page landing on disk" meant before.

sinks:
  - id: document-mounted
    sink: app/main:mount
    description: >
      the mount sink — the document rendered into the page and the toggle wired, the terminal
      effect the app exists to produce. mount() is where the pure renderer's output and the
      session's state become something a reader can see and type into; everything upstream is
      preparation and everything inside it is presentation.
