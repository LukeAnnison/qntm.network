- id: capabilities-have-runtime-enforcers
  intent: The site's claims are checked by a deterministic static-evidence runner
    (curl the live URL for 200 + valid cert; assert index.html carries the viewport
    meta + signature interactions), so `flow-trace verify .` produces real PASS/FAIL
    and the built capabilities above earn genuine greens instead of observed-only
    thin confidence. The industrialization step.
  tier: non-functional
  status: working
  enforced_by:
  - declared_state: state-capabilities-have-runtime-enforcers
    verify: PASS
  enforcement_depth: 1
  enforcement_surface: 0
  confidence: thin
- id: app-is-a-typed-browser-application
  intent: qntm.network is built as a real TypeScript browser application — npm-managed
    dependencies, a tsconfig with strict typechecking, a bundler producing a versioned
    dist/, and a CI build that runs on push so the deploy stays push-to-publish. The
    foundation every later app capability (render, edit, structure, graph, sync) is
    built on, chosen for where this is going rather than for what the demo page was.
  tier: foundational
  rooting: isolated — class-rooting is NOT ACHIEVABLE for this capability today, and
    this opt-out is a tool ceiling rather than a design preference. flow-trace derives
    classes and topology from Python call capture (`sys.setprofile`, src/flow_trace/capture.py);
    this capability is realised entirely in TypeScript, which flow-trace cannot yet
    capture. The opt-out CONVERTS to real class-rooting the moment flow-trace's `typescript-capture-backend`
    row lands — it is a dated debt with a named creditor, not a permanent isolation
    claim.
  status: working
  enforced_by:
  - declared_state: state-app-is-a-typed-build
    verify: PASS
  enforcement_depth: 1
  enforcement_surface: 0
  confidence: thin
- id: demo-renders-markdown-in-the-browser
  intent: A reader opening qntm.network/demo gets markdown rendered to clean, legible
    HTML by the browser itself — headings, emphasis, lists, code, links — from a single
    TypeScript renderer that is the ONLY markdown implementation in the project. Replaces
    the build-time Python renderer (qntm_network/render/), which retires along with
    its declared flows and its file-write sink, so no second implementation is carried.
  tier: functional
  rooting: isolated — same tool ceiling as app-is-a-typed-browser-application. The
    renderer is TypeScript and flow-trace's capture is Python-only, so no class can
    be rooted against it until `typescript-capture-backend` lands. Converts to class-rooted
    at that point.
  status: working
  enforced_by:
  - declared_state: state-markdown-renders-client-side
    verify: PASS
  enforcement_depth: 1
  enforcement_surface: 0
  confidence: thin
- id: reader-can-toggle-edit-and-view-modes
  intent: A reader on the demo page can toggle between VIEW mode (the rendered document,
    read-only) and EDIT mode (the markdown source, editable, re-rendering as they
    type), and back, without losing what they typed in the session. Edits are EPHEMERAL
    BY DESIGN — held in memory only, never persisted, discarded on refresh. The ephemerality
    is a declared property with its own enforcer rather than an unimplemented TODO.
    This is the smallest honest version of the qntm editing surface, and "it does
    not save" is a commitment that should fail loudly if someone later makes it save
    by accident.
  tier: functional
  rooting: isolated — same tool ceiling as app-is-a-typed-browser-application. The
    editor is TypeScript and flow-trace's capture is Python-only, so no class can
    be rooted against it until `typescript-capture-backend` lands. Converts to class-rooted
    at that point.
  status: working
  enforced_by:
  - declared_state: state-edit-and-view-modes-are-togglable
    verify: PASS
  - declared_state: state-edits-are-ephemeral
    verify: PASS
  enforcement_depth: 2
  enforcement_surface: 0
  confidence: held
