capabilities:
- id: landing-page-renders
  intent: A visitor lands on qntm.network and sees the brand, the thesis ("the path
    of least resistance"), the three acts, the creed, and a way to leave their email
    — the whole story in one scroll.
  tier: foundational
  status: working
  enforced_by:
  - declared_state: state-landing-page-present
    verify: PASS
  enforcement_depth: 1
  enforcement_surface: 0
  confidence: thin
- id: served-securely-over-https
  intent: Every visitor reaches the site over a valid HTTPS certificate (CN=qntm.network,
    Let's Encrypt) with http→https redirect and www→apex — no security warning by
    any route.
  tier: foundational
  status: working
  enforced_by:
  - declared_state: state-served-over-valid-https
    verify: PASS
  enforcement_depth: 1
  enforcement_surface: 0
  confidence: thin
- id: push-to-deploy-loop
  intent: The operator changes the site and runs `git push` — live on qntm.network
    in under a minute, with no human in the loop between the push and the deploy.
    The path of least resistance for iteration itself. (AMENDED 2026-07-23 — the original
    wording added "no separate build or upload step", which described the hand-authored-HTML
    implementation of the day, not the commitment. The commitment is PUSH IS THE WHOLE
    DEPLOY — a build that runs automatically in CI honours it exactly; a build the
    operator must remember to run locally does not. Retiring the incidental clause
    is what lets the app become a compiled TypeScript application without either violating
    this pin or quietly redefining it.)
  tier: functional
  rooting: isolated — this capability has no code to root against, in any language.
    It is a property of the DEPLOY PATH (a CNAME, the Pages source setting, and a
    CI workflow), so there is no class it could ever route through and no tool ceiling
    to wait on. Reasoned here because this arc amended the capability and GATE-ROOTED
    audits what an arc touches; the eight other pre-existing capabilities still carry
    a silent absence, which is real debt this arc did not take on rather than something
    it resolved.
  status: working
  enforced_by:
  - declared_state: state-deploy-is-push-to-publish
    verify: PASS
  enforcement_depth: 1
  enforcement_surface: 0
  confidence: thin
