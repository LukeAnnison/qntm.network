# qntm.network — flows.yaml. DECLARATION, not code — the call-flow SHAPE we commit code to.
# flow-trace measures the captured flow against this:
#   observed AND declared      -> ok (the code does what we said)
#   observed but NOT declared  -> drift (the code does something we never committed to)
#   declared but NOT observed  -> a commitment the code stopped honouring
#
# EMPTY, and deliberately so (2026-07-23). It held five flows for the Python render app
# (qntm_network.render.build -> renderer / styles / write_page), which RETIRED when rendering
# moved into the browser: a live editor cannot re-run a build-time Python pipeline on every
# keystroke, and keeping the Python renderer alongside the TypeScript one would have left two
# implementations of one contract to diverge (architecture.yaml#one-implementation-per-concern).
# Those flows were removed in the SAME change as the code they described, so this file never
# spent a moment declaring topology that no longer existed.
#
# It stays empty until flow-trace can capture TypeScript. The successor flows are real and
# knowable — main.mount -> MarkdownRenderer.toHtml, main.mount -> EditorSession.toggle, and the
# DOM mount as the terminal effect — but flow-trace's capture is `sys.setprofile`, Python only.
# Declaring them now would manufacture five permanent declared-but-never-observed findings, which
# would read as governance while being precisely its opposite: a commitment nothing can check.
# They get declared when flow-trace's `typescript-capture-backend` row lands. Until then the TS
# app is held to state.yaml's static-evidence invariants, which verify that the right things
# exist and are wired — real evidence, but existence-checking, never topological proof.

expected_flows: []

forbidden_flows: []
