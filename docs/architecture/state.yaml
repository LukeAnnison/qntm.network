# qntm.network — state.yaml (the deterministic artifact/endpoint-check invariants).
#
# These are the enforcers — the deterministic checks that, run by the static-evidence runner
# (capabilities-have-runtime-enforcers), produce real PASS/FAIL for the capabilities above.
# `check` documents exactly what each asserts.
#
# All invariants here are now WIRED (the original header described a pre-runner state that ended
# 2026-06-27, when the runner landed and the first nine flipped green). A wired invariant that
# FAILs is not broken governance — it is a RED specification of work not yet done, which is
# exactly what the application-stratum block at the bottom of this file currently is.

state_invariants:

  - id: state-landing-page-present
    name: the live page renders the brand, thesis, and the email form
    description: |
      A fetch of the live site returns HTML carrying the brand mark, the headline ("path of least
      resistance"), and a request-access email form — the deterministic proxy for "the whole story
      in one scroll renders".
    check: "fetch qntm.network -> HTML contains the brand, the headline, and an email <form>"
    evidence_tier: static
    predicate: qntm_network_checks:assert_landing_page_present
    scenarios: "static_evidence"
    wired: true
    gates_capabilities: [landing-page-renders]

  - id: state-served-over-valid-https
    name: the live site serves over a valid qntm.network certificate, no warning by any route
    description: |
      A request to https://qntm.network returns 200 with a certificate whose CN matches the
      domain (not the *.github.io fallback); http://qntm.network 301-redirects to https; and
      www.qntm.network redirects to the apex. The "no security warning" guarantee, made checkable.
    check: "curl -sI https://qntm.network -> 200 + cert CN=qntm.network; http -> 301 https; www -> apex"
    evidence_tier: static
    predicate: qntm_network_checks:assert_served_over_valid_https
    scenarios: "static_evidence"
    wired: true
    gates_capabilities: [served-securely-over-https]

  - id: state-deploy-is-push-to-publish
    name: the deploy path is push-to-publish (no human in the loop after the push)
    description: |
      The repo publishes via GitHub Pages from main root with a CNAME file = qntm.network; a push
      to main is the entire deploy. Checkable from the repo + Pages config, no human in the loop.

      AMENDED 2026-07-23 alongside capabilities.yaml#push-to-deploy-loop. The invariant is NO
      HUMAN IN THE LOOP AFTER THE PUSH — not "no build exists". A build that runs automatically
      on push (CI) satisfies this; a build the operator must remember to run locally does not.
      When the TypeScript app's CI build lands, this predicate EXTENDS to assert the workflow is
      present and triggers on push to main — it does not get relaxed. Tightening the check as the
      deploy grows is the point; the commitment is unchanged.
    check: "CNAME file == 'qntm.network'; Pages source = main:/; a git push to main is the deploy,
      with any build step running automatically in CI (never a manual local step)"
    evidence_tier: static
    predicate: qntm_network_checks:assert_deploy_is_push_to_publish
    scenarios: "static_evidence"
    wired: true
    gates_capabilities: [push-to-deploy-loop]

  - id: state-responsive-meta-present
    name: the page declares responsive behaviour
    description: |
      index.html carries the viewport meta and the mobile media-query rules that reflow the hero,
      creed, and forms — the deterministic proxy for "legible on mobile".
    check: "index.html contains <meta name=viewport ...> AND @media (max-width: 760px) rules"
    evidence_tier: static
    predicate: qntm_network_checks:assert_responsive_meta_present
    scenarios: "static_evidence"
    wired: true
    gates_capabilities: [responsive-across-devices]

  - id: state-signature-interactions-present
    name: the signature interactions are present in the page
    description: |
      index.html wires the glowing cursor (#cursor-glow), the repel/spring-back headlines
      (class="repel"), and the scattered creed (creed-grid) — the structural proxy that the
      thesis-as-interaction shipped and hasn't rotted out.
    check: "index.html contains 'cursor-glow' AND 'class=\"repel\"' AND 'creed-grid'"
    evidence_tier: static
    predicate: qntm_network_checks:assert_signature_interactions_present
    scenarios: "static_evidence"
    wired: true
    gates_capabilities: [signature-interactions-embody-the-thesis]

  - id: state-email-signups-persisted
    name: a submitted email is captured to a durable, retrievable list
    description: |
      The request-access form POSTs to a real endpoint and a test submission lands in a durable
      store the operator can export — not the current onsubmit-no-op. The enforcer for the email
      capture capability, RED until the backend is wired.
    check: "form action posts to a live endpoint; a test signup is retrievable/exportable"
    evidence_tier: static
    predicate: qntm_network_checks:assert_email_signups_persisted
    scenarios: "static_evidence"
    wired: true
    gates_capabilities: [captures-and-persists-email-signups]

  - id: state-capabilities-have-runtime-enforcers
    name: a static-evidence runner exists and flow-trace verify runs real predicates
    description: |
      A project-local static-evidence scenario + predicate module (qntm_network_checks) exists and
      `flow-trace verify .` executes it, so the invariants above flip from UNVERIFIABLE to real
      PASS/FAIL. Self-referential: the enforcer for "we have enforcers".
    check: "`flow-trace verify .` runs the static_evidence scenario and reports per-invariant PASS/FAIL"
    evidence_tier: static
    predicate: qntm_network_checks:assert_static_evidence_runner_wired
    scenarios: "static_evidence"
    wired: true
    gates_capabilities: [capabilities-have-runtime-enforcers]

  - id: state-link-preview-renders
    name: a shared link renders a proper preview card
    description: |
      index.html declares Open Graph (og:title/description/image/url) + Twitter card meta, and a
      1200x630 preview image (og.png) exists in the repo — so pasting qntm.network into X / iMessage
      / Slack shows a branded card, not a bare URL. SCAFFOLD-RED until the meta + image land.
    check: "index.html has og:title/description/image + twitter:card; og.png exists"
    evidence_tier: static
    predicate: qntm_network_checks:assert_link_preview_meta_present
    scenarios: "static_evidence"
    wired: true
    gates_capabilities: [shared-links-render-a-preview]

  - id: state-visits-are-measured
    name: site traffic is measured (privacy-friendly)
    description: |
      index.html ships the Cloudflare Web Analytics beacon (static.cloudflareinsights.com/beacon
      + a data-cf-beacon token) so visits, sources, and referrers are visible — no cookies, no
      banner. SCAFFOLD-RED until the beacon snippet (with token) is added.
    check: "index.html contains cloudflareinsights.com/beacon AND data-cf-beacon token"
    evidence_tier: static
    predicate: qntm_network_checks:assert_visits_are_measured
    scenarios: "static_evidence"
    wired: true
    gates_capabilities: [visits-are-measured]

  # ── The application stratum (2026-07-23) ─────────────────────────────────────────────────
  # Enforcers for the TypeScript app capabilities. All four are wired and green. They were
  # scaffolded RED against a repo with no app/ at all, and the FAIL→PASS transition as the app
  # landed is what proves those capabilities closed rather than were declared closed.
  #
  # Note the shape these take: Python predicates asserting over TypeScript ARTIFACTS (files,
  # config, built output, the live page). They verify that the right things EXIST and are wired
  # — never that the calls flow as declared. That second question used to be unanswerable here;
  # since flow-trace's TypeScript capture landed and was adopted the same day, it is answered by
  # flows.yaml adjudicated against tests/flow_scenarios/render_and_edit.ts. The two are
  # complementary and neither implies the other: existence checks catch a deleted file, flow
  # checks catch a rewiring that leaves every file in place. Read each for what it asserts.

  - id: state-app-is-a-typed-build
    name: the app is a strict-typechecked TypeScript build wired into CI
    description: |
      The repo carries a real TypeScript toolchain — package.json with a build script, a tsconfig
      declaring strict mode, TypeScript sources under app/, and a GitHub Actions workflow that
      runs the build on push to main. Together these make "typed application" checkable rather
      than aspirational: a build that never runs, or a tsconfig with strict off, is the failure
      mode this exists to catch. SCAFFOLD-RED until the toolchain lands.
    check: "package.json has a build script; tsconfig.json sets strict: true; app/**/*.ts sources
      exist; .github/workflows/ contains a workflow triggering on push to main that runs the build"
    evidence_tier: static
    predicate: qntm_network_checks:assert_app_is_a_typed_build
    scenarios: "static_evidence"
    wired: true
    gates_capabilities: [app-is-a-typed-browser-application]

  - id: state-markdown-renders-client-side
    name: the demo page renders markdown in the browser from a single TS renderer
    description: |
      The demo page loads the built app bundle and renders markdown client-side, and there is
      exactly ONE markdown implementation in the repo — the TypeScript renderer. The retired
      Python render package (qntm_network/render/) is GONE, not merely unused: a dormant second
      renderer is the exact duplication this capability exists to prevent, and a check that only
      asserted the TS renderer's presence would pass happily with both sitting side by side.
      SCAFFOLD-RED until the port lands and the Python package is removed.
    check: "demo/index.html loads the built app bundle; a TS markdown renderer exists under app/;
      qntm_network/render/ is absent; no declared flow or sink still references it"
    evidence_tier: static
    predicate: qntm_network_checks:assert_markdown_renders_client_side
    scenarios: "static_evidence"
    wired: true
    gates_capabilities: [demo-renders-markdown-in-the-browser]

  - id: state-edit-and-view-modes-are-togglable
    name: the demo page exposes a view/edit mode toggle
    description: |
      The app exposes two explicit modes — a read-only rendered view and an editable markdown
      source view — with a control that switches between them. Checked structurally against the
      TS sources and the served page. SCAFFOLD-RED until the editor lands.
    check: "an editor module under app/ declares both modes and a toggle between them; the built
      page exposes the mode control"
    evidence_tier: static
    predicate: qntm_network_checks:assert_edit_and_view_modes_are_togglable
    scenarios: "static_evidence"
    wired: true
    gates_capabilities: [reader-can-toggle-edit-and-view-modes]

  - id: state-edits-are-ephemeral
    name: edits are held in memory only and never persisted
    description: |
      The editor persists NOTHING — no localStorage, no sessionStorage, no IndexedDB, no network
      write of document content. "All lost on refresh" is a declared property of this version, so
      it gets a real enforcer rather than a comment: if someone later adds persistence without
      declaring it, this FAILs and the change has to be made deliberately, through governance,
      rather than silently altering what the thing is.

      This is an ABSENCE invariant, and absence checks are easy to write badly — it asserts over
      the app's own sources, not the whole repo, so the Worker's legitimate signup persistence
      (worker/src/index.js writes to D1 by design) does not trip it.
    check: "no localStorage / sessionStorage / indexedDB reference in app/ sources; no fetch or
      XHR carrying document content out of the editor module"
    evidence_tier: static
    predicate: qntm_network_checks:assert_edits_are_ephemeral
    scenarios: "static_evidence"
    wired: true
    gates_capabilities: [reader-can-toggle-edit-and-view-modes]
