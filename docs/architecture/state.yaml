# qntm.network — state.yaml (the deterministic artifact/endpoint-check invariants).
#
# These are the CANDIDATE enforcers — the deterministic checks that, once WIRED into a static-
# evidence runner (capabilities-have-runtime-enforcers), produce real PASS/FAIL for the
# capabilities above. `wired: false` everywhere TODAY = the predicate is not yet built, so each
# reads UNVERIFIABLE and the caps it would gate stay observed-thin (no fake greens). Wiring them
# is the industrialization work. `check` documents exactly what each will assert.

state_invariants:

  - id: state-landing-page-present
    name: the live page renders the brand, thesis, and the email form
    description: |
      A fetch of the live site returns HTML carrying the brand mark, the headline ("path of least
      resistance"), and a request-access email form — the deterministic proxy for "the whole story
      in one scroll renders".
    check: "fetch qntm.network -> HTML contains the brand, the headline, and an email <form>"
    evidence_tier: static
    predicate: qntm_network_checks:assert_landing_page_present
    scenarios: "static_evidence"
    wired: true
    gates_capabilities: [landing-page-renders]

  - id: state-served-over-valid-https
    name: the live site serves over a valid qntm.network certificate, no warning by any route
    description: |
      A request to https://qntm.network returns 200 with a certificate whose CN matches the
      domain (not the *.github.io fallback); http://qntm.network 301-redirects to https; and
      www.qntm.network redirects to the apex. The "no security warning" guarantee, made checkable.
    check: "curl -sI https://qntm.network -> 200 + cert CN=qntm.network; http -> 301 https; www -> apex"
    evidence_tier: static
    predicate: qntm_network_checks:assert_served_over_valid_https
    scenarios: "static_evidence"
    wired: true
    gates_capabilities: [served-securely-over-https]

  - id: state-deploy-is-push-to-publish
    name: the deploy path is push-to-publish (no manual build/upload step)
    description: |
      The repo publishes via GitHub Pages from main root with a CNAME file = qntm.network; a push
      to main is the entire deploy. Checkable from the repo + Pages config, no human in the loop.
    check: "CNAME file == 'qntm.network'; Pages source = main:/; a git push to main is the deploy"
    evidence_tier: static
    predicate: qntm_network_checks:assert_deploy_is_push_to_publish
    scenarios: "static_evidence"
    wired: true
    gates_capabilities: [push-to-deploy-loop]

  - id: state-responsive-meta-present
    name: the page declares responsive behaviour
    description: |
      index.html carries the viewport meta and the mobile media-query rules that reflow the hero,
      creed, and forms — the deterministic proxy for "legible on mobile".
    check: "index.html contains <meta name=viewport ...> AND @media (max-width: 760px) rules"
    evidence_tier: static
    predicate: qntm_network_checks:assert_responsive_meta_present
    scenarios: "static_evidence"
    wired: true
    gates_capabilities: [responsive-across-devices]

  - id: state-signature-interactions-present
    name: the signature interactions are present in the page
    description: |
      index.html wires the glowing cursor (#cursor-glow), the repel/spring-back headlines
      (class="repel"), and the scattered creed (creed-grid) — the structural proxy that the
      thesis-as-interaction shipped and hasn't rotted out.
    check: "index.html contains 'cursor-glow' AND 'class=\"repel\"' AND 'creed-grid'"
    evidence_tier: static
    predicate: qntm_network_checks:assert_signature_interactions_present
    scenarios: "static_evidence"
    wired: true
    gates_capabilities: [signature-interactions-embody-the-thesis]

  - id: state-email-signups-persisted
    name: a submitted email is captured to a durable, retrievable list
    description: |
      The request-access form POSTs to a real endpoint and a test submission lands in a durable
      store the operator can export — not the current onsubmit-no-op. The enforcer for the email
      capture capability, RED until the backend is wired.
    check: "form action posts to a live endpoint; a test signup is retrievable/exportable"
    evidence_tier: static
    predicate: qntm_network_checks:assert_email_signups_persisted
    scenarios: "static_evidence"
    wired: true
    gates_capabilities: [captures-and-persists-email-signups]

  - id: state-capabilities-have-runtime-enforcers
    name: a static-evidence runner exists and flow-trace verify runs real predicates
    description: |
      A project-local static-evidence scenario + predicate module (qntm_network_checks) exists and
      `flow-trace verify .` executes it, so the invariants above flip from UNVERIFIABLE to real
      PASS/FAIL. Self-referential: the enforcer for "we have enforcers".
    check: "`flow-trace verify .` runs the static_evidence scenario and reports per-invariant PASS/FAIL"
    evidence_tier: static
    predicate: qntm_network_checks:assert_static_evidence_runner_wired
    scenarios: "static_evidence"
    wired: true
    gates_capabilities: [capabilities-have-runtime-enforcers]

  - id: state-link-preview-renders
    name: a shared link renders a proper preview card
    description: |
      index.html declares Open Graph (og:title/description/image/url) + Twitter card meta, and a
      1200x630 preview image (og.png) exists in the repo — so pasting qntm.network into X / iMessage
      / Slack shows a branded card, not a bare URL. SCAFFOLD-RED until the meta + image land.
    check: "index.html has og:title/description/image + twitter:card; og.png exists"
    evidence_tier: static
    predicate: qntm_network_checks:assert_link_preview_meta_present
    scenarios: "static_evidence"
    wired: true
    gates_capabilities: [shared-links-render-a-preview]

  - id: state-visits-are-measured
    name: site traffic is measured (privacy-friendly)
    description: |
      index.html ships the Cloudflare Web Analytics beacon (static.cloudflareinsights.com/beacon
      + a data-cf-beacon token) so visits, sources, and referrers are visible — no cookies, no
      banner. SCAFFOLD-RED until the beacon snippet (with token) is added.
    check: "index.html contains cloudflareinsights.com/beacon AND data-cf-beacon token"
    evidence_tier: static
    predicate: qntm_network_checks:assert_visits_are_measured
    scenarios: "static_evidence"
    wired: true
    gates_capabilities: [visits-are-measured]
