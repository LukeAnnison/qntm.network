# qntm.network — .flow-trace.yaml (self-application config).
#
# A STATIC landing site: no traced code, no Python runtime. Instrumented DECLARATION-ONLY for
# now — capabilities / architecture / state / backlog declared in the canonical flow-trace layout
# so the global registry (~/.flow-trace/registry.yaml) and the /trace workflow can read it and
# derive a board. Evidence tier TODAY = DECLARED/OBSERVED (a human watched the site render, curled
# the cert) — NOT runtime-verified. That is honest, not fake-green: the built capabilities carry
# `confidence: thin` and no passing enforcer.
#
# INDUSTRIALIZATION PATH (the forward-thinking half): add a static-evidence runner — a project-local
# scenario + deterministic predicates (curl https://qntm.network → 200 + valid cert; assert index.html
# carries the viewport meta + the signature interactions; assert the deploy is push-to-publish) that
# `flow-trace verify .` / `map .` RUN to produce real PASS/FAIL. Driven by the capability
# `capabilities-have-runtime-enforcers`. Mirrors how trace-orchestration earned its static greens.
#
# Read it like anywhere (cheap reads work without a runtime):
#   flow-trace capability-rollup .   # caps -> working / partial / undeclared, H-rooted, drift
#   flow-trace queue .               # the derived work queue (actionable / diagnose-ready / pool)
#   flow-trace backlog .             # the rows x driving_capability
#   flow-trace map-registry          # this project as one member of the cross-project board

ordering: capability-driven

# CAPTURE FILTER — the TypeScript app (2026-07-23, second pass).
#
# For a JS/TS target, module identity is the REPO-RELATIVE PATH WITHOUT EXTENSION
# (`app/render/renderer`), so these entries are path PREFIXES, not dotted package roots — the
# convention differs from the Python side and the loader treats them accordingly (flow-trace
# js_capture.py). The scenario suffix is what dispatches a run to the node observer rather than
# `sys.setprofile`; nothing here selects the backend.
#
# The history in one line, because this file changed shape twice in two days: it pointed at
# `qntm_network.render` while the Python render app existed (2026-07-22), went never-matching
# when that app retired into TypeScript and flow-trace could not see TS at all, and now points at
# app/ because flow-trace's `typescript-capture-backend` landed (v1, working at depth 3). The
# observed half — traced flows, depth-to-sink, canonical routing, declared-vs-actual drift —
# reaches this project's real code for the first time.
#
# `app/boot` is EXCLUDED on purpose. It is the bootstrap: its only job is a top-level side effect,
# it is the build's entry point, and nothing imports it. Observing it would record a single
# start-up edge that says nothing about how the app is structured.
modules:
  include:
    - app
  exclude:
    - app/boot
