<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex" />
<title>qntm — the app</title>
<style>
  :root {
    --bg: #07080a; --ink: #eef1f4; --dim: #8b93a1; --line: #1b1f26;
    --glow: #7cc7ff; --accent: #cfe8ff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: radial-gradient(1200px 800px at 50% -10%, #0e1420 0%, var(--bg) 60%);
    color: var(--ink);
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex; align-items: flex-start; justify-content: center;
    padding: max(6vh, 2rem) 1.25rem 4rem;
  }
  .wrap { width: 100%; max-width: 560px; }
  .brand { letter-spacing: .32em; text-transform: uppercase; font-size: .72rem; color: var(--dim); }
  h1 { font-weight: 600; font-size: clamp(1.6rem, 5vw, 2.2rem); margin: .4rem 0 .2rem; }
  .tag { color: var(--dim); margin: 0 0 2rem; }
  button {
    font: inherit; color: var(--bg); background: var(--accent);
    border: 0; border-radius: 10px; padding: .7rem 1.1rem; cursor: pointer;
    font-weight: 600; transition: transform .08s ease, box-shadow .2s ease;
    box-shadow: 0 0 0 rgba(124,199,255,0);
  }
  button:hover { box-shadow: 0 0 28px rgba(124,199,255,.35); }
  button:active { transform: translateY(1px); }
  button.ghost { background: transparent; color: var(--accent); box-shadow: none; border: 1px solid var(--line); }
  button.ghost:hover { border-color: var(--glow); box-shadow: 0 0 20px rgba(124,199,255,.12); }
  input {
    font: inherit; color: var(--ink); background: #0c0f14; border: 1px solid var(--line);
    border-radius: 10px; padding: .75rem .9rem; width: 100%; outline: none;
  }
  input:focus { border-color: var(--glow); box-shadow: 0 0 24px rgba(124,199,255,.15); }
  .row { display: flex; gap: .6rem; align-items: center; }
  .stack > * + * { margin-top: .9rem; }
  .muted { color: var(--dim); font-size: .88rem; }
  .err { color: #ff9b9b; font-size: .88rem; min-height: 1.2em; }
  .card { border: 1px solid var(--line); border-radius: 16px; padding: 1.1rem 1.15rem; background: rgba(255,255,255,.015); }
  .hidden { display: none !important; }

  /* THE ONE THING */
  .one-label { letter-spacing: .28em; text-transform: uppercase; font-size: .64rem; color: var(--glow); }
  .one-thing {
    font-size: clamp(1.3rem, 4.5vw, 1.9rem); font-weight: 600; line-height: 1.25;
    margin: .35rem 0 1rem; text-wrap: balance;
  }
  .one-empty { color: var(--dim); font-weight: 400; }
  .rest { margin-top: 1.6rem; }
  .rest h3 { font-size: .7rem; letter-spacing: .22em; text-transform: uppercase; color: var(--dim); margin: 0 0 .5rem; }
  .item { display: flex; align-items: flex-start; gap: .6rem; padding: .5rem 0; border-top: 1px solid var(--line); }
  .item:first-child { border-top: 0; }
  .tick { flex: none; width: 20px; height: 20px; border-radius: 6px; border: 1px solid var(--line); background: transparent; padding: 0; }
  .tick:hover { border-color: var(--glow); box-shadow: 0 0 14px rgba(124,199,255,.25); }
  .topbar { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1.4rem; }
  a { color: var(--accent); }

  /* NAV (tabs, logged in) */
  .nav { display: flex; gap: .4rem; margin-bottom: 1.4rem; }
  .tab {
    background: transparent; color: var(--dim); border: 1px solid var(--line);
    border-radius: 999px; padding: .4rem .95rem; font-size: .82rem; box-shadow: none;
  }
  .tab:hover { border-color: var(--glow); box-shadow: 0 0 16px rgba(124,199,255,.12); }
  .tab.active { color: var(--bg); background: var(--accent); border-color: var(--accent); }

  /* GRAPH viewer */
  .gbar { display: flex; align-items: center; gap: .6rem; margin-bottom: .5rem; }
  select {
    font: inherit; color: var(--ink); background: #0c0f14; border: 1px solid var(--line);
    border-radius: 10px; padding: .55rem .8rem; width: 100%; outline: none;
  }
  select:focus { border-color: var(--glow); box-shadow: 0 0 24px rgba(124,199,255,.15); }
  #freshness { margin: 0 0 1.1rem; }
  .viewbody { overflow-x: auto; }
  .viewbody h1, .viewbody h2, .viewbody h3 { font-weight: 600; line-height: 1.25; }
  .viewbody h2 { font-size: 1.05rem; margin: 1.4rem 0 .5rem; color: var(--accent); }
  .viewbody h3 { font-size: .92rem; margin: 1.1rem 0 .4rem; color: var(--dim); }
  .viewbody ul { padding-left: 1.2rem; margin: .3rem 0; }
  .viewbody li { margin: .18rem 0; }
  .viewbody a { color: var(--glow); }
  .viewbody code { background: #0c0f14; border: 1px solid var(--line); border-radius: 6px; padding: .05rem .35rem; font-size: .85em; }
  .viewbody table { border-collapse: collapse; width: 100%; font-size: .9rem; }
  .viewbody th, .viewbody td { border: 1px solid var(--line); padding: .35rem .55rem; text-align: left; }
  .viewbody hr { border: 0; border-top: 1px solid var(--line); margin: 1.2rem 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div><span class="brand">qntm</span></div>
    <div id="who" class="muted hidden"></div>
  </div>

  <!-- ENTRY (logged out) -->
  <section id="entry" class="hidden">
    <h1>Enter the path.</h1>
    <p class="tag">One thing at a time. Sign in with a passkey — no password to hold.</p>
    <div class="card stack">
      <button id="loginBtn">Continue with a passkey</button>
      <div class="muted">New here?</div>
      <div class="row">
        <input id="handle" placeholder="claim a handle" autocomplete="username webauthn" autocapitalize="off" spellcheck="false" />
        <button id="registerBtn" class="ghost" style="white-space:nowrap">Create passkey</button>
      </div>
      <div id="entryErr" class="err"></div>
    </div>
  </section>

  <!-- NAV (logged in) -->
  <nav id="nav" class="nav hidden">
    <button id="navFocus" class="tab active">Focus</button>
    <button id="navGraph" class="tab">Graph</button>
  </nav>

  <!-- GRAPH (logged in) — the rendering of the graph, hosted -->
  <section id="graph" class="hidden">
    <div class="gbar"><select id="viewPick" aria-label="Choose a view"></select></div>
    <p id="freshness" class="muted"></p>
    <article id="viewBody" class="viewbody"></article>
  </section>

  <!-- APP (logged in) -->
  <section id="app" class="hidden">
    <h1 style="margin-bottom:1.2rem">What do you already know needs doing?</h1>
    <div class="card">
      <div class="one-label">The one thing</div>
      <div id="oneThing" class="one-thing"></div>
      <button id="doneBtn" class="hidden">Done — it's held no longer</button>
    </div>
    <div class="row stack" style="margin-top:1.2rem">
      <input id="captureBox" placeholder="capture a thought — press enter" autocomplete="off" />
    </div>
    <div id="appErr" class="err"></div>
    <div class="rest">
      <h3 id="restHead" class="hidden">Also held</h3>
      <div id="rest"></div>
    </div>
    <p style="margin-top:2rem"><button id="logoutBtn" class="ghost">Sign out</button></p>
  </section>
</div>

<script type="module">
import { startRegistration, startAuthentication } from "https://esm.sh/@simplewebauthn/browser@13";
import MarkdownIt from "https://esm.sh/markdown-it@14";

// Same markdown setup as app/render/renderer.ts — CommonMark + the table rule.
const md = new MarkdownIt("commonmark").enable("table");

const API = location.hostname === "localhost" || location.hostname === "127.0.0.1"
  ? "http://localhost:8787"
  : "https://qntm-signups.lukeannison.workers.dev";

const $ = (id) => document.getElementById(id);
const tokenKey = "qntm_token";
let token = localStorage.getItem(tokenKey);

function show(view) {
  const loggedIn = view === "app";
  $("entry").classList.toggle("hidden", view !== "entry");
  $("app").classList.toggle("hidden", view !== "app");
  $("nav").classList.toggle("hidden", !loggedIn);
  if (!loggedIn) $("graph").classList.add("hidden");
}
async function api(path, { method = "POST", body, auth = false } = {}) {
  const headers = { "Content-Type": "application/json" };
  if (auth && token) headers["Authorization"] = "Bearer " + token;
  const res = await fetch(API + path, { method, headers, body: body ? JSON.stringify(body) : undefined });
  const data = await res.json().catch(() => ({}));
  if (!res.ok || data.ok === false) throw new Error(data.error || ("request failed (" + res.status + ")"));
  return data;
}

// --- render the app ---
function render(state) {
  $("who").textContent = state.handle ? "@" + state.handle : "";
  $("who").classList.remove("hidden");
  const one = state.oneThing;
  if (one) {
    $("oneThing").textContent = one.text;
    $("oneThing").classList.remove("one-empty");
    $("doneBtn").classList.remove("hidden");
    $("doneBtn").dataset.id = one.id;
  } else {
    $("oneThing").textContent = "Nothing held. Capture the first thing.";
    $("oneThing").classList.add("one-empty");
    $("doneBtn").classList.add("hidden");
  }
  const rest = (state.captures || []).slice(1);
  $("restHead").classList.toggle("hidden", rest.length === 0);
  $("rest").innerHTML = "";
  for (const c of rest) {
    const row = document.createElement("div");
    row.className = "item";
    const tick = document.createElement("button");
    tick.className = "tick"; tick.title = "done"; tick.dataset.id = c.id;
    tick.addEventListener("click", () => done(c.id));
    const span = document.createElement("div");
    span.textContent = c.text;
    row.append(tick, span);
    $("rest").append(row);
  }
}

async function loadState() {
  const state = await api("/app/state", { method: "GET", auth: true });
  render(state); show("app");
}
async function capture(text) {
  render(await api("/app/capture", { body: { text }, auth: true }));
}
async function done(id) {
  render(await api("/app/done", { body: { id }, auth: true }));
}

// --- graph viewer: the rendering of the graph, fetched behind the passkey ---
let graphData = null;

function paintView(id) {
  const v = graphData?.snapshot?.views.find((x) => x.id === id);
  $("viewBody").innerHTML = v ? md.render(v.markdown) : "";
}

async function loadGraph() {
  const data = await api("/app/graph", { method: "GET", auth: true });
  graphData = data;
  const pick = $("viewPick");
  pick.innerHTML = "";
  if (!data.snapshot) {
    $("freshness").textContent = "No snapshot yet — run graph-sync push on the laptop.";
    $("viewBody").innerHTML = "";
    return;
  }
  // Group the views by domain into <optgroup>s, alphabetised.
  const byDomain = {};
  for (const v of data.snapshot.views) (byDomain[v.domain || "—"] ||= []).push(v);
  for (const dom of Object.keys(byDomain).sort()) {
    const og = document.createElement("optgroup");
    og.label = dom;
    for (const v of byDomain[dom].sort((a, b) => a.title.localeCompare(b.title))) {
      const o = document.createElement("option");
      o.value = v.id;
      o.textContent = v.title;
      og.append(o);
    }
    pick.append(og);
  }
  const when = new Date(data.snapshot.generated_at).toLocaleString();
  $("freshness").textContent = `as of ${when} · ${data.pending_edits} queued`;
  const def = data.snapshot.views.find((v) => v.id === "this-week") || data.snapshot.views[0];
  pick.value = def.id;
  paintView(def.id);
}

function tab(which) {
  $("navFocus").classList.toggle("active", which === "focus");
  $("navGraph").classList.toggle("active", which === "graph");
  $("app").classList.toggle("hidden", which !== "focus");
  $("graph").classList.toggle("hidden", which !== "graph");
  if (which === "graph" && !graphData) {
    loadGraph().catch((e) => { $("freshness").textContent = e.message; });
  }
}

// --- passkey register / login ---
async function register() {
  $("entryErr").textContent = "";
  const handle = $("handle").value.trim();
  if (!handle) { $("entryErr").textContent = "pick a handle first"; return; }
  try {
    const { flowId, options } = await api("/auth/register/options", { body: { handle } });
    const response = await startRegistration({ optionsJSON: options });
    const out = await api("/auth/register/verify", { body: { flowId, response } });
    token = out.token; localStorage.setItem(tokenKey, token);
    await loadState();
  } catch (e) { $("entryErr").textContent = e.message; }
}
async function login() {
  $("entryErr").textContent = "";
  try {
    const { flowId, options } = await api("/auth/login/options", { body: {} });
    const response = await startAuthentication({ optionsJSON: options });
    const out = await api("/auth/login/verify", { body: { flowId, response } });
    token = out.token; localStorage.setItem(tokenKey, token);
    await loadState();
  } catch (e) { $("entryErr").textContent = e.message; }
}
function logout() {
  api("/auth/logout", { auth: true }).catch(() => {});
  localStorage.removeItem(tokenKey); token = null;
  graphData = null; tab("focus");
  show("entry");
}

// --- wire up ---
$("registerBtn").addEventListener("click", register);
$("loginBtn").addEventListener("click", login);
$("handle").addEventListener("keydown", (e) => { if (e.key === "Enter") register(); });
$("doneBtn").addEventListener("click", () => done($("doneBtn").dataset.id));
$("logoutBtn").addEventListener("click", logout);
$("navFocus").addEventListener("click", () => tab("focus"));
$("navGraph").addEventListener("click", () => tab("graph"));
$("captureBox").addEventListener("keydown", async (e) => {
  if (e.key !== "Enter") return;
  const v = e.target.value.trim(); if (!v) return;
  e.target.value = "";
  try { await capture(v); } catch (err) { $("appErr").textContent = err.message; }
});

// --- boot: try the stored session, else show entry ---
(async () => {
  if (token) { try { await loadState(); return; } catch { localStorage.removeItem(tokenKey); token = null; } }
  show("entry");
})();
</script>
</body>
</html>
